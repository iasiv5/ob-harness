interface:
  display_name: "Brainstorming 需求澄清"
  short_description: "把模糊需求澄清成经批准的设计文档"
  default_prompt: "使用 $brainstorming，先把这个需求澄清成设计文档，再决定是否进入实现。不要直接写代码。"
compatibility:
  canonical_format: "agent-skills"
  adapter_targets:
    - "openai"
    - "claude"
    - "generic"
  activation:
    mode: "manual"
    paths: []
  execution:
    context: "inline"
    shell: "bash"
  trust:
    source_tier: "local"
    remote_inline_execution: "forbid"
    remote_metadata_policy: "allow-metadata-only"
  degradation:
    openai: "metadata-adapter"
    claude: "neutral-source-plus-adapter"
    generic: "neutral-source"