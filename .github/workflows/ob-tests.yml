name: ob tests

on:
  push:
    branches: [main, 'refactor/**']
  pull_request:

jobs:
  fast:
    name: protocol + unit + orchestration (快速 .sh)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install shellcheck + expect
        run: sudo apt-get update && sudo apt-get install -y shellcheck expect
      - name: run_all(默认只跑 .sh,~1.5s;--full 才跑慢的交互矩阵)
        run: bash tests/run_all.sh
      - name: shellcheck 防退化(baseline diff)
        run: |
          shellcheck -f gcc ob > /tmp/sc.new 2>&1 || true
          if ! diff -u tests/.shellcheck-baseline /tmp/sc.new; then
            echo "::error::shellcheck 新增告警(改 ob 后跑 'shellcheck -f gcc ob > tests/.shellcheck-baseline' 更新 baseline,或修复)"
            exit 1
          fi
          echo "shellcheck 无新增(与 baseline 一致)"
      - name: coverage radar(报告,不阻断)
        run: tools/trace_collect.sh | python3 tools/coverage_radar.py - | grep '^TOTAL'
